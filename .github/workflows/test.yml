name: pytest
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python runtime
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pytest
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Run tests
        run: pytest -q

  coverage:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python runtime
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip pytest pytest-cov
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Run branch coverage gate
        run: pytest --cov=pygments_bsl --cov-branch --cov-report=term-missing --cov-fail-under=95 -q

  package:
    needs: [test, coverage]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python runtime
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip build twine
          python -m pip install -r requirements.txt
          python -m pip install -e .
      - name: Build Python package
        run: python -m build
      - name: Check Python package
        run: python -m twine check dist/*
      - name: Smoke test built artifacts
        run: python tools/check_dist.py
